name: PR Conventions

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "Validating branch: $BRANCH"
          if [[ ! "$BRANCH" =~ ^(feat|fix|chore)/[a-z0-9-]+-[0-9]+$ ]]; then
            echo "Branch must match: (feat|fix|chore)/<slug>-<issueNumber>"
            echo "Example: feat/admin-trip-log-filters-142"
            exit 1
          fi

      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Validating PR title: $TITLE"
          if [[ ! "$TITLE" =~ ^(feat|fix|chore):[[:space:]].+ ]]; then
            echo "PR title must start with 'feat: ', 'fix: ', or 'chore: '"
            exit 1
          fi

      - name: Validate PR body structure
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          if [[ -z "$BODY" ]]; then
            echo "PR body is required."
            exit 1
          fi

          for heading in "## Summary" "## Implementation Notes" "## Testing Notes"; do
            if ! printf '%s' "$BODY" | grep -Fq "$heading"; then
              echo "Missing required PR section: $heading"
              exit 1
            fi
          done

          if ! printf '%s' "$BODY" | grep -Eqi 'Closes #[0-9]+'; then
            echo "PR body must include 'Closes #<issueNumber>'."
            exit 1
          fi

